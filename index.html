<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCU FORMULA: Concert Dash</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            color: #00ffcc;
            text-shadow: 0 0 10px #00ffcc;
            margin-bottom: 20px;
            text-align: center;
        }
        #gameArea {
            position: relative;
        }
        canvas {
            background: linear-gradient(to bottom, #2b003b, #000000);
            border-bottom: 5px solid #ff00ff;
            box-shadow: 0 10px 20px rgba(255, 0, 255, 0.3);
            display: block;
            border-radius: 5px 5px 0 0;
        }
        #scoreDisplay {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 8px #ff00ff;
        }
        #overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        #overlay h2 {
            font-size: 36px;
            color: #ff3333;
            margin: 0 0 10px 0;
            text-shadow: 0 0 15px #ff3333;
        }
        button {
            background: #00ffcc;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
            transition: 0.2s;
        }
        button:hover {
            background: #fff;
            box-shadow: 0 0 15px #00ffcc;
            transform: scale(1.05);
        }
        .controls {
            margin-top: 20px;
            color: #888;
        }
    </style>
</head>
<body>

    <h1>🎸 BCU FORMULA: Concert Dash 🏎️</h1>

    <div id="gameArea">
        <div id="scoreDisplay">SCORE: <span id="score">0</span></div>
        <canvas id="gameCanvas" width="800" height="300"></canvas>
        
        <div id="overlay">
            <h2>STAGE FAILED!</h2>
            <p>คะแนนความมันส์ของคุณ: <span id="finalScore" style="font-size: 24px; font-weight: bold; color: #00ffcc;">0</span></p>
            <button onclick="resetGame()">เล่นอีกครั้ง</button>
        </div>
    </div>

    <div class="controls">วิธีกระโดด: กดปุ่ม <b>Spacebar</b> หรือ <b>แตะหน้าจอ</b></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const finalScoreEl = document.getElementById('finalScore');
        const overlay = document.getElementById('overlay');

        // ตัวแปรระบบเกม
        let isPlaying = true;
        let score = 0;
        let frame = 0;
        let gameSpeed = 6;
        let animationId;

        // ตัวแปรผู้เล่น (รถฟอร์มูล่า)
        const car = {
            x: 50,
            y: 200,
            width: 50,
            height: 40,
            dy: 0,
            gravity: 0.8,
            jumpPower: -12,
            isGrounded: true
        };

        const groundY = 240; // ระดับพื้นเวที
        let obstacles = []; // อาเรย์เก็บสิ่งกีดขวาง

        // ฟังก์ชันกระโดด
        function jump() {
            if (car.isGrounded && isPlaying) {
                car.dy = car.jumpPower;
                car.isGrounded = false;
            }
        }

        // รับค่าการกดปุ่มและแตะหน้าจอ
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') jump();
        });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        // สร้างสิ่งกีดขวาง
        function spawnObstacle() {
            const emojis = ['🔊', '🎸', '🎹'];
            const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            
            obstacles.push({
                x: canvas.width,
                y: groundY - 35,
                width: 40,
                height: 40,
                emoji: randomEmoji
            });
        }

        // ลูปหลักของเกม
        function update() {
            if (!isPlaying) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // วาดพื้นเวที
            ctx.fillStyle = '#ff00ff';
            ctx.fillRect(0, groundY + 10, canvas.width, 5);

            // วาดเอฟเฟกต์แสงไฟคอนเสิร์ต (กระพริบตามเฟรม)
            if (frame % 30 < 15) {
                ctx.fillStyle = 'rgba(0, 255, 204, 0.1)';
                ctx.beginPath();
                ctx.moveTo(canvas.width / 2, 0);
                ctx.lineTo(0, groundY);
                ctx.lineTo(canvas.width, groundY);
                ctx.fill();
            }

            // ระบบฟิสิกส์การตกของรถ
            car.dy += car.gravity;
            car.y += car.dy;

            // เช็คการชนพื้น
            if (car.y >= groundY - car.height) {
                car.y = groundY - car.height;
                car.dy = 0;
                car.isGrounded = true;
            }

            // วาดรถ
            ctx.font = "45px Arial";
            ctx.fillText("🏎️", car.x, car.y + car.height);

            // จัดการสิ่งกีดขวาง
            for (let i = 0; i < obstacles.length; i++) {
                let obs = obstacles[i];
                obs.x -= gameSpeed;

                // วาดสิ่งกีดขวาง
                ctx.font = "40px Arial";
                ctx.fillText(obs.emoji, obs.x, obs.y + obs.height);

                // เช็คการชน (Collision Detection)
                // ปรับขอบเขตการชนให้เล็กลงนิดหน่อยเพื่อให้เล่นง่ายขึ้น
                if (
                    car.x < obs.x + obs.width - 10 &&
                    car.x + car.width - 10 > obs.x &&
                    car.y < obs.y + obs.height - 10 &&
                    car.y + car.height - 10 > obs.y
                ) {
                    gameOver();
                }

                // ลบสิ่งกีดขวางที่พ้นจอและบวกคะแนน
                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                    i--;
                    score += 10;
                    scoreEl.innerText = score;
                }
            }

            // เพิ่มความเร็วเกมและสุ่มของตามระยะเวลา
            frame++;
            if (frame % 600 === 0) gameSpeed += 1; // วิ่งเร็วขึ้นเรื่อยๆ
            
            // สุ่มระยะห่างการเกิดของสิ่งกีดขวาง
            if (frame % Math.floor(Math.random() * 60 + 80) === 0) {
                spawnObstacle();
            }

            animationId = requestAnimationFrame(update);
        }

        // จบเกม
        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            finalScoreEl.innerText = score;
            overlay.style.display = 'flex';
        }

        // เริ่มเกมใหม่
        function resetGame() {
            car.y = groundY - car.height;
            car.dy = 0;
            obstacles = [];
            score = 0;
            frame = 0;
            gameSpeed = 6;
            scoreEl.innerText = score;
            overlay.style.display = 'none';
            isPlaying = true;
            update();
        }

        // เริ่มเกมครั้งแรก
        update();
    </script>
</body>
</html>
